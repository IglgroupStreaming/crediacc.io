<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrediACC - Panel de Gestión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 30px 20px;
            color: #1a1a2e;
        }
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 25px 30px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
        }
        .header h1 span {
            color: #f9c74f;
        }
        .btn {
            background: #f9c74f;
            color: #1a1a2e;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #f7b32b;
        }
        .btn-reset {
            background: #e63946;
            color: white;
        }
        .btn-reset:hover {
            background: #c1121f;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 180px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
        }
        .stat-card .number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .section {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9ff;
            font-weight: 600;
            color: #1a1a2e;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        .empty-message {
            text-align: center;
            padding: 30px;
            color: #888;
            font-style: italic;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .stats {
                flex-direction: column;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                display: none;
            }
            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                font-weight: 600;
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>Credi<span>ACC</span> · Panel</h1>
        <div>
            <button class="btn" onclick="actualizarDatos()">🔄 Actualizar</button>
            <button class="btn btn-reset" onclick="resetearDatos()">🗑️ Resetear todo</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>👥 Clientes registrados</h3>
            <div class="number" id="totalClientes">0</div>
        </div>
        <div class="stat-card">
            <h3>💳 Tokens generados</h3>
            <div class="number" id="totalTokens">0</div>
        </div>
        <div class="stat-card">
            <h3>✅ Cobros realizados</h3>
            <div class="number" id="totalCobrados">0</div>
        </div>
    </div>

    <!-- Tabla de clientes -->
    <div class="section">
        <h2>📋 Clientes Registrados</h2>
        <div id="tablaClientes"></div>
    </div>

    <!-- Tabla de movimientos (tokens QR) -->
    <div class="section">
        <h2>🧾 Movimientos (Tokens QR)</h2>
        <div id="tablaTokens"></div>
    </div>
</div>

<script>
    const STORAGE_CLIENTES = 'crediacc_clientes';
    const STORAGE_TOKENS = 'crediacc_tokens';

    function getClientes() {
        return JSON.parse(localStorage.getItem(STORAGE_CLIENTES) || '{}');
    }

    function getTokens() {
        return JSON.parse(localStorage.getItem(STORAGE_TOKENS) || '{}');
    }

    function actualizarDatos() {
        const clientes = getClientes();
        const tokens = getTokens();

        // Estadísticas
        const clienteList = Object.values(clientes);
        const tokenList = Object.values(tokens);
        const cobrados = tokenList.filter(t => t.utilizado === true).length;

        document.getElementById('totalClientes').textContent = clienteList.length;
        document.getElementById('totalTokens').textContent = tokenList.length;
        document.getElementById('totalCobrados').textContent = cobrados;

        // Renderizar tabla de clientes
        const tablaClientes = document.getElementById('tablaClientes');
        if (clienteList.length === 0) {
            tablaClientes.innerHTML = '<div class="empty-message">No hay clientes registrados aún.</div>';
        } else {
            let html = `<table>
                <thead><tr>
                    <th>DNI</th><th>Nombre</th><th>Email</th><th>Scoring</th><th>Límite</th><th>Registro</th>
                </tr></thead><tbody>`;
            clienteList.forEach(c => {
                html += `<tr>
                    <td data-label="DNI">${c.dni}</td>
                    <td data-label="Nombre">${c.nombre}</td>
                    <td data-label="Email">${c.email}</td>
                    <td data-label="Scoring">${c.scoring}</td>
                    <td data-label="Límite">$${c.limite_aprobado.toLocaleString()}</td>
                    <td data-label="Registro">${new Date(c.created_at || Date.now()).toLocaleString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            tablaClientes.innerHTML = html;
        }

        // Renderizar tabla de tokens
        const tablaTokens = document.getElementById('tablaTokens');
        if (tokenList.length === 0) {
            tablaTokens.innerHTML = '<div class="empty-message">No hay transacciones aún.</div>';
        } else {
            let html = `<table>
                <thead><tr>
                    <th>Token</th><th>Cliente DNI</th><th>Monto</th><th>Cuotas</th><th>Valor Cuota</th><th>Total</th><th>Expira</th><th>Estado</th>
                </tr></thead><tbody>`;
            tokenList.forEach(t => {
                const ahora = new Date();
                const expira = new Date(t.expira_en);
                let estado = '';
                if (t.utilizado) {
                    estado = '<span class="badge badge-success">Cobrado</span>';
                } else if (expira < ahora) {
                    estado = '<span class="badge badge-danger">Expirado</span>';
                } else {
                    estado = '<span class="badge badge-warning">Activo</span>';
                }
                html += `<tr>
                    <td data-label="Token">${t.token || Object.keys(tokens).find(k => tokens[k] === t)}</td>
                    <td data-label="Cliente">${t.cliente_dni}</td>
                    <td data-label="Monto">$${t.monto_original.toLocaleString()}</td>
                    <td data-label="Cuotas">${t.cuotas}</td>
                    <td data-label="Valor Cuota">$${t.valor_cuota.toLocaleString()}</td>
                    <td data-label="Total">$${t.total_a_pagar.toLocaleString()}</td>
                    <td data-label="Expira">${expira.toLocaleString()}</td>
                    <td data-label="Estado">${estado}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            tablaTokens.innerHTML = html;
        }
    }

    function resetearDatos() {
        if (confirm('¿Estás seguro de eliminar todos los clientes y transacciones? Esta acción no se puede deshacer.')) {
            localStorage.removeItem(STORAGE_CLIENTES);
            localStorage.removeItem(STORAGE_TOKENS);
            actualizarDatos();
        }
    }

    // Inicializar al cargar
    window.addEventListener('load', actualizarDatos);
    // También refrescar cuando la pestaña gana foco (por si se actualiza desde otra pestaña)
    window.addEventListener('focus', actualizarDatos);
    // Actualizar cada 30 segundos
    setInterval(actualizarDatos, 30000);
</script>
</body>
</html>
