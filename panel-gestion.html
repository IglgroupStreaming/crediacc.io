<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrediACC - Panel de Gestión</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height:100vh; padding:30px 20px; color:#1a1a2e; }
    .dashboard { max-width:1000px; margin:0 auto; }
    .header { background:#1a1a2e; color:white; padding:25px 30px; border-radius:24px; display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; box-shadow:0 10px 25px rgba(0,0,0,0.4); }
    .header h1 { font-size:2rem; font-weight:700; }
    .header h1 span { color:#f9c74f; }
    .btn { background:#f9c74f; color:#1a1a2e; border:none; padding:12px 20px; border-radius:12px; font-weight:700; cursor:pointer; transition:0.2s; font-size:0.9rem; }
    .btn:hover { background:#f7b32b; }
    .section { background:white; border-radius:24px; padding:25px; margin-bottom:25px; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
    .section h2 { margin-bottom:20px; font-size:1.3rem; }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    th, td { padding:14px 10px; text-align:left; border-bottom:1px solid #eee; }
    th { background:#f8f9ff; font-weight:600; }
    .badge { padding:4px 12px; border-radius:20px; font-size:0.8rem; font-weight:600; }
    .badge-success { background:#d4edda; color:#155724; }
    .badge-warning { background:#fff3cd; color:#856404; }
    .empty-message { text-align:center; padding:30px; color:#888; font-style:italic; }
    .row-flex { display:flex; gap:10px; align-items:center; }
    .small-input { padding:10px; border:2px solid #e0e3eb; border-radius:12px; font-size:0.9rem; width:150px; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>Credi<span>ACC</span> · Panel</h1>
    <button class="btn" onclick="cargarDatos()">🔄 Actualizar</button>
  </div>

  <div class="section">
    <h2>📋 Registro de Clientes</h2>
    <div id="tablaClientes"></div>
  </div>

  <div class="section">
    <h2>🚚 Entrega de Equipos</h2>
    <div class="row-flex" style="margin-bottom:15px;">
      <input class="small-input" type="text" id="tokenEntrega" placeholder="Token del QR">
      <button class="btn" onclick="entregarEquipo()">✅ Marcar como entregado</button>
    </div>
    <div id="tablaEntregas"></div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzMH-zac8R8F3Q3i98oY3qZH4yJDUbsKHPn5sPebVh0RxCnbAk--8RtSoG8ZcGn4nkN/exec';

  async function cargarDatos() {
    // Clientes
    try {
      const resp = await fetch(API_URL + '?action=clientes');
      const clientes = await resp.json();
      let html = '';
      if (!clientes.length) {
        html = '<div class="empty-message">No hay clientes registrados.</div>';
      } else {
        html = '<table><thead><tr><th>DNI</th><th>Nombre</th><th>Email</th><th>Scoring</th><th>Límite</th><th>Registro</th></tr></thead><tbody>';
        clientes.forEach(c => {
          html += `<tr>
            <td>${c.dni}</td><td>${c.nombre}</td><td>${c.email}</td><td>${c.scoring}</td>
            <td>$${Number(c.limite_aprobado).toLocaleString()}</td><td>${new Date(c.created_at).toLocaleString()}</td>
          </tr>`;
        });
        html += '</tbody></table>';
      }
      document.getElementById('tablaClientes').innerHTML = html;
    } catch (e) {
      document.getElementById('tablaClientes').innerHTML = '<div class="empty-message">Error al cargar clientes.</div>';
    }

    // Entregas
    try {
      const resp = await fetch(API_URL + '?action=entregas');
      const entregas = await resp.json();
      let html = '';
      if (!entregas.length) {
        html = '<div class="empty-message">No hay entregas registradas.</div>';
      } else {
        html = '<table><thead><tr><th>Token</th><th>Cliente DNI</th><th>Monto</th><th>Cuotas</th><th>Valor Cuota</th><th>Total</th><th>Estado</th><th>Fecha entrega</th></tr></thead><tbody>';
        entregas.forEach(e => {
          const estado = e.estado || (e.utilizado === 'true' ? 'entregado' : 'pendiente');
          const badge = estado === 'entregado' ? 'badge-success' : 'badge-warning';
          html += `<tr>
            <td>${e.token}</td><td>${e.cliente_dni}</td><td>$${Number(e.monto_original).toLocaleString()}</td>
            <td>${e.cuotas}</td><td>$${Number(e.valor_cuota).toLocaleString()}</td><td>$${Number(e.total_a_pagar).toLocaleString()}</td>
            <td><span class="badge ${badge}">${estado}</span></td>
            <td>${e.fecha_entrega ? new Date(e.fecha_entrega).toLocaleString() : '-'}</td>
          </tr>`;
        });
        html += '</tbody></table>';
      }
      document.getElementById('tablaEntregas').innerHTML = html;
    } catch (e) {
      document.getElementById('tablaEntregas').innerHTML = '<div class="empty-message">Error al cargar entregas.</div>';
    }
  }

  async function entregarEquipo() {
    const token = document.getElementById('tokenEntrega').value.trim();
    if (!token) return alert('Ingresa el token del QR');
    try {
      const resp = await fetch(API_URL + '?action=entregarEquipo', {
        method: 'POST',
        body: JSON.stringify({ token })
      });
      const data = await resp.json();
      if (data.error) {
        alert('Error: ' + data.error);
      } else {
        alert('✅ Equipo entregado correctamente. Cliente: ' + data.resumen.cliente);
        cargarDatos();
      }
    } catch (e) {
      alert('Error de conexión');
    }
  }

  window.addEventListener('load', cargarDatos);
  window.addEventListener('focus', cargarDatos);
</script>
</body>
</html>
