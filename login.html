<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrediACC - Iniciar Sesión</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
        body{background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .login-container{max-width:420px;width:100%}
        .login-card{background:white;border-radius:24px;padding:35px 30px;box-shadow:0 20px 40px rgba(0,0,0,0.4)}
        .login-header{text-align:center;margin-bottom:30px}
        .login-header .logo-icon{font-size:3.5rem;margin-bottom:10px}
        .login-header h1{font-size:2rem;font-weight:800;color:#1a1a2e}
        .login-header h1 span{color:#f9c74f}
        .login-header p{color:#888;font-size:0.9rem;margin-top:5px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-weight:600;margin-bottom:6px;color:#1a1a2e;font-size:0.9rem}
        .form-group .input-wrapper{position:relative}
        .form-group .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem}
        .form-group input{width:100%;padding:13px 14px 13px 42px;border:2px solid #e0e3eb;border-radius:12px;font-size:0.95rem;outline:none;transition:0.3s;background:#f8f9ff}
        .form-group input:focus{border-color:#f9c74f;box-shadow:0 0 0 3px rgba(249,199,79,0.15);background:white}
        .btn-login{width:100%;padding:14px;background:#1a1a2e;color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:0.3s;margin-bottom:15px}
        .btn-login:hover{background:#2d2d44;transform:translateY(-1px)}
        .btn-login:disabled{background:#888;cursor:not-allowed;transform:none}
        .btn-back{width:100%;padding:12px;background:transparent;color:#1a1a2e;border:2px solid #e0e3eb;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:0.3s;text-align:center;display:block;text-decoration:none}
        .btn-back:hover{background:#f8f9ff;border-color:#1a1a2e}
        .alert{padding:12px 15px;border-radius:10px;margin-bottom:20px;font-size:0.85rem;display:none;text-align:center}
        .alert.error{background:#fff0f0;color:#c1121f;border:1px solid #ffb3b3;display:block}
        .alert.success{background:#f0fff4;color:#155724;border:1px solid #b3e6c1;display:block}
        .loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">🔐</div>
            <h1>Credi<span>ACC</span></h1>
            <p>Panel de Administración</p>
        </div>
        <div id="alert" class="alert"></div>
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <div class="input-wrapper"><span class="input-icon">👤</span><input type="text" id="usuario" placeholder="Ingresá tu usuario" required autocomplete="off"></div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper"><span class="input-icon">🔒</span><input type="password" id="password" placeholder="Ingresá tu contraseña" required autocomplete="off"></div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
        </form>
        <a href="index.html" class="btn-back">← Volver al inicio</a>
    </div>
</div>
<script>
    const API_URL='https://script.google.com/macros/s/AKfycbxpcjLyZ9OAg9U35OUfRlsbLvZsPM13JW8xhYgb-9ht3wygtEwJgEK37dh-0fQSSurang/exec';
    const sesion=localStorage.getItem('crediacc_sesion');
    if(sesion){const d=JSON.parse(sesion);if(d.expiracion&&new Date().getTime()<d.expiracion){window.location.href='panel-control.html';}else{localStorage.removeItem('crediacc_sesion');}}
    const loginForm=document.getElementById('loginForm'),btnLogin=document.getElementById('btnLogin'),alertDiv=document.getElementById('alert');
    function mostrarAlerta(m,t){alertDiv.textContent=m;alertDiv.className='alert '+t;}
    loginForm.addEventListener('submit',async(e)=>{
        e.preventDefault();
        const u=document.getElementById('usuario').value.trim(),p=document.getElementById('password').value.trim();
        if(!u||!p){mostrarAlerta('⚠️ Completa todos los campos.','error');return;}
        btnLogin.disabled=true;btnLogin.innerHTML='<span class="loader"></span> Iniciando sesión...';
        try{
            const r=await fetch(API_URL+'?action=login',{method:'POST',body:JSON.stringify({usuario:u,password:p})});
            const d=await r.json();
            if(d.error){mostrarAlerta('❌ '+d.error,'error');btnLogin.disabled=false;btnLogin.innerHTML='Iniciar Sesión';return;}
            if(d.success){
                localStorage.setItem('crediacc_sesion',JSON.stringify({usuario:d.usuario,token:d.token,expiracion:new Date().getTime()+(8*60*60*1000)}));
                mostrarAlerta('✅ ¡Inicio de sesión exitoso! Redirigiendo...','success');
                setTimeout(()=>{window.location.href='panel-control.html';},800);
            }
        }catch(e){mostrarAlerta('❌ Error de conexión.','error');btnLogin.disabled=false;btnLogin.innerHTML='Iniciar Sesión';}
    });
</script>
</body>
</html>
